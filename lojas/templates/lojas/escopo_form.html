{% extends "lojas/base.html" %}

{% block titulo %}{{ titulo }}{% endblock %}

{% block content %}
<header>
    <h1>{{ titulo }}</h1>
</header>

<form method="post">
    {% csrf_token %}

    <section aria-label="Cabeçalho do escopo">
        {{ form.as_p }}
    </section>

    <h2>Itens do Escopo</h2>
    {{ formset.management_form }}

    <div id="itens-escopo">
        {% for item_form in formset %}
            <fieldset>
                <legend>Item</legend>
                {{ item_form.as_p }}
            </fieldset>
        {% endfor %}
    </div>

    <p><button type="button" id="add-item-btn">Adicionar item</button></p>

    <template id="item-escopo-template">
        <fieldset>
            <legend>Item</legend>
            {{ formset.empty_form.as_p }}
        </fieldset>
    </template>

    <script>
        (function () {
            const addBtn = document.getElementById("add-item-btn");
            const container = document.getElementById("itens-escopo");
            const totalFormsInput = document.getElementById("id_itens-TOTAL_FORMS");
            const template = document.getElementById("item-escopo-template");

            if (!addBtn || !container || !totalFormsInput || !template) return;

            addBtn.addEventListener("click", function () {
                const currentIndex = Number(totalFormsInput.value);
                const html = template.innerHTML.replace(/__prefix__/g, currentIndex);
                container.insertAdjacentHTML("beforeend", html);
                totalFormsInput.value = currentIndex + 1;
            });
        })();
    </script>

    <p>
        <button type="submit">Salvar</button>
        <a href="{% url 'lista_escopos' %}">Cancelar</a>
    </p>
</form>
{% endblock %}
