{% extends "lojas/base.html" %}
{% block content %}
<h1>{{ titulo }}</h1>

<form method="post">
  {% csrf_token %}

  <div class="card mb-3">
    <div class="card-body">
      {{ form.as_p }}
    </div>
  </div>

  <h5>Itens do Escopo</h5>
  {{ formset.management_form }}

  {% for item_form in formset %}
    <div class="card mb-2">
      <div class="card-body">
        {{ item_form.as_p }}
      </div>
    </div>
  {% endfor %}

  <button type="submit" class="btn btn-success">Salvar</button>
  <a href="{% url 'lista_escopos' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
