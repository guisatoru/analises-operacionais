<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Cadastro de Lojas{% endblock %}</title>
    {% block extrahead %}{% endblock %}
</head>
<body>
    <header>
        <p><a href="{% url 'inicio' %}">Análises Operacionais</a></p>
        {% include "lojas/partials/sidebar_nav.html" %}
    </header>

    <main>
        {% if messages %}
            {% for mensagem in messages %}
                <div role="status" data-message-tags="{{ mensagem.tags|default:'' }}">{{ mensagem }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Sistema interno de cadastro de lojas</p>
    </footer>
</body>
</html>
