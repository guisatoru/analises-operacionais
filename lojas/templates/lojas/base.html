{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Cadastro de Lojas{% endblock %}</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>
        body {
            background-color: #f5f6fa;
        }
        .table-clickable tbody tr {
            cursor: pointer;
        }
        .table-clickable tbody tr:hover {
            background-color: #eef3ff;
        }
        .navbar-brand {
            font-weight: 600;
        }
        .card-section h5 {
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{% url 'lista_lojas' %}">Análises Operacionais</a>
        <div class="d-flex">
            <a class="btn btn-outline-light me-2" href="{% url 'lista_lojas' %}">Lojas</a>
            <a class="btn btn-light text-primary fw-semibold" href="{% url 'nova_loja' %}">+ Nova Loja</a>
        </div>
    </div>
</nav>

<main class="container my-4">
    {% if messages %}
        {% for mensagem in messages %}
            <div class="alert alert-{{ mensagem.tags|default:'info' }} alert-dismissible fade show" role="alert">
                {{ mensagem }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block conteudo %}{% endblock %}
</main>

<footer class="text-center text-muted small py-3">
    <div class="container">
        Sistema interno de cadastro de lojas
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
