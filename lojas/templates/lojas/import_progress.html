{% extends "lojas/base.html" %}
{% load static %}

{% block titulo %}{{ titulo }}{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-info">
        <span class="page-eyebrow">Importação</span>
        <h1>{{ titulo }}</h1>
        <p>Acompanhe o andamento do processamento do arquivo.</p>
    </div>
</div>

<div class="card mt-4">
    <div class="card-body">
        <!-- Barra de progresso -->
        <div class="progress mb-4" style="height: 30px;">
            <div id="progress-bar" 
                 class="progress-bar progress-bar-striped progress-bar-animated" 
                 role="progressbar" 
                 style="width: 0%;" 
                 aria-valuenow="0" 
                 aria-valuemin="0" 
                 aria-valuemax="100">
                0%
            </div>
        </div>
        
        <!-- Mensagem de status -->
        <div id="status-message" class="alert alert-info mb-4">
            <span id="status-text">Iniciando processamento...</span>
        </div>
        
        <!-- Botão de voltar (oculto até terminar) -->
        <div id="back-button" style="display: none;" class="text-center">
            <a href="{% url 'importacoes' %}" class="btn btn-primary btn-lg">
                <i class="fa-solid fa-arrow-left me-2"></i>
                Voltar para Central de Importações
            </a>
        </div>
    </div>
</div>

<script>
const importId = "{{ import_id }}";
let pollInterval;

function updateProgress(data) {
    const progressBar = document.getElementById('progress-bar');
    const statusMessage = document.getElementById('status-message');
    const statusText = document.getElementById('status-text');
    const backButton = document.getElementById('back-button');
    
    // Atualiza barra de progresso
    progressBar.style.width = data.progress + '%';
    progressBar.setAttribute('aria-valuenow', data.progress);
    progressBar.textContent = data.progress + '%';
    
    // Atualiza texto com ícone adequado
    let icon = '<i class="fa-solid fa-spinner fa-spin me-2"></i>';
    
    if (data.status === 'completed') {
        icon = '<i class="fa-solid fa-circle-check me-2"></i>';
    } else if (data.status === 'error') {
        icon = '<i class="fa-solid fa-circle-exclamation me-2"></i>';
    }
    
    statusText.innerHTML = icon + data.message;
    
    // Reseta classes
    statusMessage.className = 'alert mb-4';
    progressBar.className = 'progress-bar';
    
    // Aplica estilos conforme status
    if (data.status === 'completed') {
        progressBar.classList.add('bg-success');
        
        if (data.msg_type === 'warning') {
            statusMessage.classList.add('alert-warning');
        } else {
            statusMessage.classList.add('alert-success');
        }
        
        backButton.style.display = 'block';
        clearInterval(pollInterval);
        
    } else if (data.status === 'error') {
        progressBar.classList.add('bg-danger');
        statusMessage.classList.add('alert-danger');
        backButton.style.display = 'block';
        clearInterval(pollInterval);
        
    } else {
        // Processando
        progressBar.classList.add('progress-bar-striped', 'progress-bar-animated');
        statusMessage.classList.add('alert-info');
    }
}

function checkStatus() {
    fetch(`/import-status/${importId}/`)
        .then(response => {
            if (!response.ok) {
                throw new Error('Status não encontrado');
            }
            return response.json();
        })
        .then(data => updateProgress(data))
        .catch(error => {
            console.error('Erro ao verificar status:', error);
            document.getElementById('status-text').textContent = 
                'Erro ao verificar progresso. A importação pode ter sido concluída.';
        });
}

// Inicia polling a cada 1 segundo
pollInterval = setInterval(checkStatus, 1000);

// Primeira verificação imediata
checkStatus();
</script>
{% endblock %}
